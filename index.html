<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Amber | Ekskluzywne wyroby z bursztynu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:'Montserrat',sans-serif;
}

nav{
    width:100%;
    text-align:center;
    padding:25px;
    position:absolute;
    top:0;
    z-index:10;
}

nav a{
    color:#d4af37;
    text-decoration:none;
    margin:0 25px;
    font-size:20px;
    font-family:'Playfair Display',serif;
}

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.70)),
    url('https://images.unsplash.com/photo-1617038220319-276d3cfab638?auto=format&fit=crop&w=1600&q=80')
    center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:82px;
    color:#d4af37;
    font-family:'Playfair Display',serif;
}

.hero p{
    font-size:28px;
    color:#eee;
    margin-top:20px;
}

.gallery{
    padding:90px 40px;
}

.gallery h2{
    text-align:center;
    font-size:52px;
    margin-bottom:50px;
    font-family:'Playfair Display',serif;
    color:#d4af37;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.grid img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 20px rgba(212,175,55,0.15);
}

.instagram{
    text-align:center;
    padding:80px 20px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:16px 36px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #222;
    color:#888;
}
</style>
</head>
<body>

<nav>
    <a href="#gallery">Galeria</a>
    <a href="#instagram">Instagram</a>
</nav>

<section class="hero">
    <div>
        <h1>M-Amber</h1>
        <p>Ekskluzywne wyroby z bursztynu</p>
    </div>
</section>

<section class="gallery" id="gallery">
    <h2>Galeria</h2>
    <div class="grid">
        <img src="twoje-zdjecie1.jpg">
        <img src="twoje-zdjecie2.jpg">
        <img src="twoje-zdjecie3.jpg">
        <img src="twoje-zdjecie4.jpg">
        <img src="twoje-zdjecie5.jpg">
    </div>
</section>

<section class="instagram" id="instagram">
    <h2>Więcej na Instagramie</h2>
    <a class="btn" href="https://www.instagram.com/maarek_golebiowski/" target="_blank">
        Przejdź do Instagrama
    </a>
</section>

<footer>
    © 2026 M-Amber
</footer>

</body>
</html>
