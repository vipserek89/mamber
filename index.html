<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Amber | Ekskluzywne wyroby z bursztynu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:'Montserrat',sans-serif;
}

nav{
    width:100%;
    text-align:center;
    padding:25px;
    position:absolute;
    top:0;
    z-index:10;
}

nav a{
    color:#d4af37;
    text-decoration:none;
    margin:0 25px;
    font-size:20px;
    font-family:'Playfair Display',serif;
    font-weight:600;
}

#languageSwitcher{
    position:absolute;
    top:20px;
    right:30px;
    background:#111;
    color:#d4af37;
    border:1px solid #d4af37;
    padding:8px 12px;
    border-radius:8px;
    font-size:16px;
}

.hero{
    height:100vh;
    background-image:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.55)),
        url('amber3.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:90px;
    color:#d4af37;
    font-family:'Playfair Display',serif;
    text-shadow:0 0 18px rgba(212,175,55,.45);
}

.hero p{
    font-size:30px;
    color:#d4af37;
    margin-top:20px;
    font-weight:500;
}

.gallery{
    padding:90px 40px;
    background:#0a0a0a;
}

.gallery h2{
    text-align:center;
    font-size:52px;
    margin-bottom:50px;
    font-family:'Playfair Display',serif;
    color:#d4af37;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.grid img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 20px rgba(212,175,55,0.15);
}

.instagram{
    text-align:center;
    padding:80px 20px;
    background:#0a0a0a;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:16px 36px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #222;
    color:#888;
}
</style>
</head>
<body>

<nav>
    <a href="#gallery" id="navGallery">Galeria</a>
    <a href="#instagram" id="navInstagram">Instagram</a>

    <select id="languageSwitcher" onchange="changeLanguage(this.value)">
        <option value="pl">PL</option>
        <option value="en">EN</option>
        <option value="de">DE</option>
        <option value="zh">中文</option>
    </select>
</nav>

<section class="hero">
    <div>
        <h1>M-Amber</h1>
        <p id="heroText">Ekskluzywne wyroby z bursztynu</p>
    </div>
</section>

<section class="gallery" id="gallery">
    <h2 id="galleryTitle">Galeria</h2>
    <div class="grid">
        <img src="amber5.png" alt="Wyroby bursztynowe 1">
        <img src="amber6.png" alt="Wyroby bursztynowe 2">
        <img src="amber7.png" alt="Wyroby bursztynowe 3">
        <img src="amber8.png" alt="Wyroby bursztynowe 4">
        <img src="amber9.png" alt="Wyroby bursztynowe 5">
    </div>
</section>

<section class="instagram" id="instagram">
    <h2 id="instaTitle">Więcej na Instagramie</h2>
    <a class="btn" id="instaBtn" href="https://www.instagram.com/maarek_golebiowski/" target="_blank">
        Przejdź do Instagrama
    </a>
</section>

<footer>
    © 2026 M-Amber
</footer>

<script>
function changeLanguage(lang){
    const translations = {
        pl: {
            hero: "Ekskluzywne wyroby z bursztynu",
            gallery: "Galeria",
            instagram: "Instagram",
            more: "Więcej na Instagramie",
            button: "Przejdź do Instagrama"
        },
        en: {
            hero: "Exclusive amber creations",
            gallery: "Gallery",
            instagram: "Instagram",
            more: "More on Instagram",
            button: "Visit Instagram"
        },
        de: {
            hero: "Exklusive Bernsteinprodukte",
            gallery: "Galerie",
            instagram: "Instagram",
            more: "Mehr auf Instagram",
            button: "Zu Instagram"
        },
        zh: {
            hero: "高端琥珀精品",
            gallery: "画廊",
            instagram: "Instagram",
            more: "更多内容请看Instagram",
            button: "前往 Instagram"
        }
    };

    document.getElementById("heroText").innerText = translations[lang].hero;
    document.getElementById("navGallery").innerText = translations[lang].gallery;
    document.getElementById("galleryTitle").innerText = translations[lang].gallery;
    document.getElementById("navInstagram").innerText = translations[lang].instagram;
    document.getElementById("instaTitle").innerText = translations[lang].more;
    document.getElementById("instaBtn").innerText = translations[lang].button;
}
</script>

</body>
</html>
