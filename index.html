<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M-Amber | Wyroby z bursztynu</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#0c0c0c;color:white}
    header{display:flex;justify-content:space-between;align-items:center;padding:25px 40px;background:#111}
    .logo{font-size:32px;font-weight:bold;color:#d4a017}
    nav a{color:white;text-decoration:none;margin-left:20px}
    .hero{text-align:center;padding:100px 20px}
    .hero h1{font-size:56px;color:#d4a017;margin-bottom:20px}
    .gallery{padding:60px 30px}
    .gallery h2{text-align:center;font-size:40px;color:#d4a017;margin-bottom:40px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
    .grid img{width:100%;height:300px;object-fit:cover;border-radius:12px}
    .instagram{text-align:center;padding:60px 20px}
    .btn{display:inline-block;padding:15px 30px;background:#d4a017;color:black;text-decoration:none;border-radius:8px;font-weight:bold}
    footer{text-align:center;padding:30px;color:#aaa}
  </style>
</head>
<body>

<header>
  <div class="logo">M-Amber</div>
  <nav>
    <a href="#galeria">Galeria</a>
    <a href="#instagram">Instagram</a>
  </nav>
</header>

<section class="hero">
  <h1>Ekskluzywne wyroby z bursztynu</h1>
</section>

<section class="gallery" id="galeria">
  <h2>Galeria</h2>
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
    <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338">
    <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
    <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338">
  </div>
</section>

<section class="instagram" id="instagram">
  <h2>Więcej na Instagramie</h2>
  <a class="btn" href="https://www.instagram.com/maarek_golebiowski/" target="_blank">
    Przejdź do Instagrama
  </a>
</section>

<footer>
  © 2026 M-Amber
</footer>

</body>
</html>
