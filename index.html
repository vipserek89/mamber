<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-Amber | Luxury Baltic Amber</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0a0a;
    color:white;
    font-family:'Montserrat',sans-serif;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:30px 60px;
    border-bottom:1px solid #222;
    background:#0d0d0d;
}

.logo{
    font-family:'Playfair Display',serif;
    font-size:42px;
    color:#d4af37;
    letter-spacing:2px;
}

nav a{
    color:#ddd;
    text-decoration:none;
    margin-left:30px;
    font-size:18px;
}

.hero{
    text-align:center;
    padding:120px 20px 80px;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:64px;
    color:#d4af37;
    margin-bottom:20px;
}

.hero p{
    font-size:22px;
    color:#bbb;
}

.gallery{
    padding:80px 40px;
}

.gallery h2{
    text-align:center;
    font-size:48px;
    margin-bottom:50px;
    font-family:'Playfair Display',serif;
    color:#d4af37;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.grid img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:18px;
    box-shadow:0 0 20px rgba(212,175,55,0.15);
    transition:0.3s;
}

.grid img:hover{
    transform:scale(1.02);
}

.instagram{
    text-align:center;
    padding:80px 20px;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:16px 36px;
    background:#d4af37;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:40px;
    border-top:1px solid #222;
    color:#888;
}
</style>
</head>
<body>

<header>
    <div class="logo">M-Amber</div>
    <nav>
        <a href="#gallery">Galeria</a>
        <a href="#instagram">Instagram</a>
    </nav>
</header>

<section class="hero">
    <h1>Ekskluzywne wyroby z bursztynu</h1>
    <p>Ręcznie tworzone dzieła inspirowane naturą Bałtyku</p>
</section>

<section class="gallery" id="gallery">
    <h2>Galeria</h2>
    <div class="grid">
        <img src="twoje-zdjecie1.jpg">
        <img src="twoje-zdjecie2.jpg">
        <img src="twoje-zdjecie3.jpg">
        <img src="twoje-zdjecie4.jpg">
        <img src="twoje-zdjecie5.jpg">
    </div>
</section>

<section class="instagram" id="instagram">
    <h2>Więcej na Instagramie</h2>
    <a class="btn" href="https://www.instagram.com/maarek_golebiowski/" target="_blank">
        Przejdź do Instagrama
    </a>
</section>

<footer>
    © 2026 M-Amber
</footer>

</body>
</html>
